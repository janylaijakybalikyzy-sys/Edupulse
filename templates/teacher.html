<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPulse - Жаңы сабак кошуу</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Comfortaa', sans-serif; 
            /* Сүрөттөгүдөй кочкул заманбап фон */
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); 
            min-height: 100vh;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 0;
            color: white;
        }

        /* Glassmorphism - Айнек формасы */
        .card { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px; 
            border-radius: 30px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
            width: 100%; 
            max-width: 450px; 
        }

        h2 { 
            text-align: center; 
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 30px;
            letter-spacing: -1px;
        }

        .plus-icon { color: #8b5cf6; }

        /* Талаалардын стили (Input) */
        input { 
            width: 100%; 
            padding: 15px 20px; 
            margin-top: 15px; 
            border-radius: 15px; 
            border: 2px solid transparent; 
            background: rgba(255, 255, 255, 0.07);
            color: white;
            font-size: 16px;
            box-sizing: border-box; 
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input:focus { 
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            border-color: #3b82f6; 
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }

        input::placeholder { color: rgba(255, 255, 255, 0.4); }

        /* Календарь иконкасын ак кылуу */
        input[type="date"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }

        label { 
            font-size: 14px; 
            color: #94a3b8; 
            display: block; 
            margin-top: 20px; 
            margin-left: 5px;
        }

        /* Жашыл баскыч */
        button { 
            background: linear-gradient(90deg, #10b981, #059669); 
            color: white; 
            border: none; 
            padding: 18px;
            border-radius: 18px;
            cursor: pointer; 
            font-weight: bold; 
            width: 100%;
            margin-top: 30px;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(16, 185, 129, 0.3);
        }

        button:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 15px 25px -5px rgba(16, 185, 129, 0.4);
            filter: brightness(1.1);
        }

        button:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="card">
        <h2>Жаңы сабак кошуу <span class="plus-icon">+</span></h2>
        
        <form action="/create_subject" method="post">
            <input type="text" name="teacher_name" placeholder="Мугалимдин аты-жөнү" required>
            <input type="text" name="name" placeholder="Сабактын аталышы (мис: Физика)" required>
            <input type="text" name="topic_name" placeholder="Сабактын темасы" required>
            
            <label>Сабак өтүлгөн күн:</label>
            <input type="date" name="lesson_date" required>
            
            <button type="submit">
                <i class="fas fa-qrcode" style="margin-right: 8px;"></i> 
                Сабакты түзүү жана QR-код алуу
            </button>
        </form>
    </div>

</body>
</html>
