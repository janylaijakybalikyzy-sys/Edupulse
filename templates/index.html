<!DOCTYPE html>
<html lang="ky">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPulse - Пикир калтыруу</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Comfortaa', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center; margin: 0; padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            padding: 35px; border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%; max-width: 400px;
        }
        h2 { text-align: center; color: #4a148c; margin-bottom: 25px; }
        .info-box {
            background: #f3f0ff; padding: 15px; border-radius: 12px;
            margin-bottom: 20px; border-left: 5px solid #764ba2;
        }
        .info-box p { margin: 5px 0; color: #4a5568; font-size: 14px; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #2d3748; font-size: 14px; }
        select, textarea {
            width: 100%; padding: 12px; margin-top: 8px; border-radius: 10px;
            border: 2px solid #e2e8f0; box-sizing: border-box; outline: none; transition: 0.3s;
        }
        select:focus, textarea:focus { border-color: #764ba2; }
        button {
            width: 100%; background: #764ba2; color: white; border: none;
            padding: 15px; border-radius: 10px; cursor: pointer;
            font-weight: bold; margin-top: 25px; font-size: 16px; transition: 0.3s;
        }
        button:hover { background: #5a368c; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="card">
        <h2>EduPulse 📝</h2>
        <div class="info-box">
            <p><strong>Сабак:</strong> {{ subject.name }}</p>
            <p><strong>Тема:</strong> {{ subject.topic_name }}</p> <p><strong>Мугалим:</strong> {{ subject.teacher_name }}</p>
            <p><strong>Күнү:</strong> {{ subject.lesson_date }}</p> </div>

        <form action="/submit/{{ subject.id }}" method="post">
            <label>Теманы түшүндүңүзбү? (1-5)</label>
            <select name="rating" required>
                <option value="5">5 - Абдан жакшы түшүндүм</option>
                <option value="4">4 - Жакшы, суроолор жок</option>
                <option value="3">3 - Орточо, кээ бир жерлери түшүнүксүз</option>
                <option value="2">2 - Кыйын болду, аз түшүндүм</option>
                <option value="1">1 - Такыр түшүнбөдүм</option>
            </select>

            <label>Эмне түшүнүксүз болду? (сунуш/пикир)</label>
            <textarea name="difficulty" rows="4" placeholder="Мисалы: Теманын башындагы формуланы кайра түшүндүрүп бериңизчи..."></textarea>
            
            <button type="submit">Пикирди жөнөтүү</button>
        </form>
    </div>
</body>
</html>
